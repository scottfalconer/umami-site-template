  field_content:
  - value: "<p>The grill flatters a steak. It transforms a vegetable. The vegetable
      costs less, needs more, and rewards attention in a way that repays the time
      you spend at the fire.</p><p>Start with heat management, not heat. Make two
      zones. Cook over the quiet side. Finish over the loud side. Do not, under any
      circumstances, try to do both at once.</p>"
    format: content_format
  field_description:
  - value: How to cook vegetables over live flame without burning them, or yourself.
