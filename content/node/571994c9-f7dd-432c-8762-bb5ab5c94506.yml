  field_method:
  - step_title: Simmer
    instruction: Combine lentils, onion, ginger, garlic, turmeric, salt, water. Simmer 25–30 min until creamy. Whisk to smooth.
  - step_title: Tarka
    instruction: Melt the butter until foaming and brown. Add cumin, chilies, curry leaves. Sizzle 20 seconds.
  - step_title: Finish
    instruction: Pour tarka over the dal. Serve with rice, yogurt, lime.
