  field_method:
  - step_title: Step 1
    instruction: In a large pan, boil the pasta in plenty of water until cooked.
  - step_title: Step 2
    instruction: Whilst the pasta is cooking, chop the onion and gently fry it with
      the garlic in a little oil until soft and the onion looks clear.
  - step_title: Step 3
    instruction: Add the vegetarian sausages. Once browned, remove and chop into chunky
      bites.
  - step_title: Step 4
    instruction: Pop the sausages back into the pan and add the tomatoes, sugar, pesto
      and sun dried tomatoes. Season to taste. Simmer until most of the water from
      the chopped tomatoes has gone.
  - step_title: Step 5
    instruction: Drain the pasta and add to the pan with the sausages and tomatoes.
      Stir in half of the cheddar and transfer to a shallow dish. Sprinkle with the
      rest of the cheddar and dot the sliced mozzarella over the top.
  - step_title: Step 6
    instruction: Grill for 10 minutes or until the cheese has melted and started to
      brown. Serve with basil leaves.
