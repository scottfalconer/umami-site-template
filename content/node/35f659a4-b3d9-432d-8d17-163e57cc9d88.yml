  field_content:
  - value: "<p>There is a particular week every couple of months where the fridge
      is bare and the pantry must come forward. It&#039;s not a sad week; it&#039;s
      a useful one. You learn, again, how much dinner lives on the shelf.</p><p>Beans
      plus lemon plus oil is dinner. Lentils plus butter is dinner. A tin of tomatoes
      with enough time in a pan is dinner. The rest is garnish.</p>"
    format: content_format
  field_description:
  - value: Five dinners out of a shelf's worth of tins, dried things, and the last
      onion.
