  field_method:
  - step_title: Step 1
    instruction: Preheat the oven to 350°F/180°C and grease two 8 inch cake tins.
  - step_title: Step 2
    instruction: In a large bowl, mix the butter and sugar together, then add the
      eggs, flour and baking powder.
  - step_title: Step 3
    instruction: Spread the mix evenly between the 2 cake tins.
  - step_title: Step 4
    instruction: Place both tins in the middle of the preheated oven for 20 minutes,
      before checking with a knife. When the knife comes out clean, it's ready!
  - step_title: Step 5
    instruction: Allow to cool in the tins before moving them onto a cooling rack.
  - step_title: Step 6
    instruction: Add the jam, stack, dust with icing sugar and serve with a big dollop
      of cream. Enjoy!
