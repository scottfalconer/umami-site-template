  field_ingredients:
  - value: '1|onion, diced

      2|carrots, diced

      3 stalks|celery, diced

      4 cloves|garlic

      1 × 400 g|tin tomatoes

      2 × 400 g|tins cannellini (one smashed)

      1 bunch|cavolo nero, stems in

      2 l|stock

      200 g|stale sourdough, torn

      a pour|red wine'
  field_method:
  - value: 'Sofritto|Sweat the onion, carrot, celery, garlic in olive oil 15 min until sweet.

      Build|Add wine, tomatoes, stock. Simmer 20 min. Add beans and cavolo, another 20 min.

      Thicken|Stir in the bread, cook a further 20 min. It should be a loose porridge.

      Rest|Cover, off heat, 15 min. Drizzle with new oil.'
