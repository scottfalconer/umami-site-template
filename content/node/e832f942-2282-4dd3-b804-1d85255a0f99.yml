  field_method:
  - step_title: Sofritto
    instruction: Sweat the onion, carrot, celery, garlic in olive oil 15 min until sweet.
  - step_title: Build
    instruction: Add wine, tomatoes, stock. Simmer 20 min. Add beans and cavolo, another 20 min.
  - step_title: Thicken
    instruction: Stir in the bread, cook a further 20 min. It should be a loose porridge.
  - step_title: Rest
    instruction: Cover, off heat, 15 min. Drizzle with new oil.
