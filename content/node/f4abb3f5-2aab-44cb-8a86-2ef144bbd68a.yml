  field_method:
  - step_title: Step 1
    instruction: In a large wok, brown the chicken until golden, then turn the heat
      down and gently cook the garlic. Add the chopped green beans and stir.
  - step_title: Step 2
    instruction: Add the coconut milk, green curry paste and fish sauce. Mix well
      and slowly simmer.
  - step_title: Step 3
    instruction: Add the chopped mushrooms and simmer until the chicken (or tofu)
      is cooked.
  - step_title: Step 4
    instruction: Serve with jasmine rice and a sprinkle of coriander.
