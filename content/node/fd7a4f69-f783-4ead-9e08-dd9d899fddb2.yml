  field_ingredients:
  - group_label: ''
    quantity: '6'
    ingredient: medium leeks, white and pale green
  - group_label: ''
    quantity: 4 tbsp
    ingredient: olive oil
  - group_label: ''
    quantity: 2 tbsp
    ingredient: sherry vinegar
  - group_label: ''
    quantity: 1 tsp
    ingredient: Dijon mustard
  - group_label: ''
    quantity: 1 tbsp
    ingredient: capers, chopped
  - group_label: ''
    quantity: '1'
    ingredient: soft-boiled egg, grated (optional)
  field_method:
  - step_title: Braise
    instruction: Halve leeks lengthwise. Lay in a pan, add 1 cm water and salt. Cover and cook 20 min until tender.
  - step_title: Dress
    instruction: Whisk oil, vinegar, mustard, capers. Spoon over leeks while still warm.
  - step_title: Serve
    instruction: Room temp is best. Grate egg over just before serving.
