  field_content:
  - value: '<p>The first rule of preserving is to do less than you think. A kilo of anything is enough for the household. Two kilos is a project. Five kilos is a phase you&#039;ll regret in July.</p><p>Start with the obvious: lemons, because they keep, and then something stone-fruited that won&#039;t. Keep the jars visible on the counter for the first month. You will open them more, which is the entire point.</p>'
    format: content_format
  field_description:
  - value: On making small jars of the season so the season does not leave you when it leaves.
