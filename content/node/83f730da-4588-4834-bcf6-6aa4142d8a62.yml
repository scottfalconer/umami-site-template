  field_ingredients:
  - value: '500 g|long-grain rice, rinsed

      3|red peppers

      2|onions

      4|tomatoes

      2 tbsp|tomato purée

      2 tsp|smoked paprika

      1 tsp|thyme

      2|bay leaves

      500 ml|stock

      60 ml|neutral oil'
  field_method:
  - value: 'Blend|Blend peppers, one onion, tomatoes until smooth.

      Fry base|Dice the other onion, fry in oil. Add purée and spices, cook 2 min. Add blended mix, reduce 15 min.

      Steam|Stir in rice and stock. Cover and cook on low 25 min without lifting the lid.

      Rest|Off heat, rest 10 min. Fluff gently.'
