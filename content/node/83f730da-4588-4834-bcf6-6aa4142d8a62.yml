  field_method:
  - step_title: Blend
    instruction: Blend peppers, one onion, tomatoes until smooth.
  - step_title: Fry base
    instruction: Dice the other onion, fry in oil. Add purée and spices, cook 2 min. Add blended mix, reduce 15 min.
  - step_title: Steam
    instruction: Stir in rice and stock. Cover and cook on low 25 min without lifting the lid.
  - step_title: Rest
    instruction: Off heat, rest 10 min. Fluff gently.
