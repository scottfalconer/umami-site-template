  field_method:
  - step_title: Step 1
    instruction: Preheat the oven to 425°F/220°C. Mix some of the milk and water in
      a jug, and add the yeast and sugar, then set aside.
  - step_title: Step 2
    instruction: In a bowl, mix the flour, salt and oil. Slowly add the liquid from
      the jug and form into a dough.
  - step_title: Step 3
    instruction: Break the dough in half and shape into two pizza bases. Set aside
      for about 15 minutes, whilst making the topping.
  - step_title: Step 4
    instruction: Spread the tomato puree over the pizza bases, chop the basil and
      rocket and sprinkle over the tomato. Lay the chopped Parma ham on top and add
      thick slices of mozzarella across the pizza.
  - step_title: Step 5
    instruction: Cook in the oven directly on the top shelf (with a tray underneath)
      for 10-12 minutes until the mozzarella is bubbling. Season with salt and pepper
      and serve.
