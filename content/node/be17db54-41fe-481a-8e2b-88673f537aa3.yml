  - group_label: Filling
    quantity: 2 tbsp
    ingredient: sugar
  - group_label: Filling
    quantity: 500 g
    ingredient: plums, halved and pitted
  - group_label: Filling
    quantity: 1 tbsp
    ingredient: turbinado sugar for the edge
  field_method:
  - step_title: Pastry
    instruction: Rub butter into flour until pea-sized. Stir in water until it just holds. Chill 30 min.
  - step_title: Assemble
    instruction: Roll to a rough 30 cm round. Scatter almonds and sugar, pile on plums, fold in the edges.
  - step_title: Bake
    instruction: 220°C for 15 min, then 190°C for 25 min until golden.
