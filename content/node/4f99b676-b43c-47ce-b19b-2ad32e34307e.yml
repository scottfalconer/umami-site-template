  field_content:
  - value: "<p>Loud desserts are a trap. The meringue towers, the sauces that arrive
      with their own geography — they are showing off, which is to say, they are announcing
      that the rest of the dinner was not quite enough on its own.</p><p>A quiet dessert
      is a vote of confidence in the dinner. A plain olive oil cake after a pasta
      is a way of saying: that was a full meal, you can sit with it, and here is a
      little something to sit with it.</p>"
    format: content_format
  field_description:
  - value: An argument for olive oil cake, and other desserts that do not shout.
