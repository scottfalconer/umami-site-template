  - entity: 8c7412da-71af-41c9-8838-1e66dd3506ee
  field_ingredients:
  - value: '## Fritters

      200 g|mixed soft herbs (parsley, dill, cilantro, mint)

      4|spring onions, thinly sliced

      3|eggs

      60 g|flour

      1 tsp|baking powder

      1 tsp|cumin, toasted

      to taste|salt and pepper

      to fry|olive oil

      ## Yogurt

      250 g|thick yogurt

      1 clove|garlic, grated

      zest of 1|lemon'
  field_method:
  - value: 'Mix|Chop the herbs roughly. Whisk eggs, flour, baking powder, spices, salt and pepper, then fold in the herbs and onions.

      Fry|Heat a good layer of oil in a wide pan. Drop spoonfuls of batter and press gently. Fry until the edges lace and brown, about 2 minutes a side.

      Serve|Stir the yogurt with garlic and lemon. Pile the fritters on top, still warm.'
  field_notes:
  - value: Any tired herbs work. Save the stems, chop finer.
