  field_description:
  - value: A fistful of every herb in the drawer, bound loosely and fried into lacy, green-edged fritters.
  field_dietary:
  - entity: 3ce6cd35-e603-4716-8056-28c655260f25
  field_difficulty:
  - value: Easy
  field_featured_image:
  - entity: 8c7412da-71af-41c9-8838-1e66dd3506ee
  field_ingredients:
  - group_label: Fritters
    quantity: 200 g
    ingredient: mixed soft herbs (parsley, dill, cilantro, mint)
  - group_label: Fritters
    quantity: '4'
    ingredient: spring onions, thinly sliced
  - group_label: Fritters
    quantity: '3'
    ingredient: eggs
  - group_label: Fritters
    quantity: 60 g
    ingredient: flour
  - group_label: Fritters
    quantity: 1 tsp
    ingredient: baking powder
  - group_label: Fritters
    quantity: 1 tsp
    ingredient: cumin, toasted
  - group_label: Fritters
    quantity: to taste
    ingredient: salt and pepper
  - group_label: Fritters
    quantity: to fry
    ingredient: olive oil
  - group_label: Yogurt
    quantity: 250 g
    ingredient: thick yogurt
  - group_label: Yogurt
    quantity: 1 clove
    ingredient: garlic, grated
  - group_label: Yogurt
    quantity: zest of 1
    ingredient: lemon
  field_method:
  - step_title: Mix
    instruction: Chop the herbs roughly. Whisk eggs, flour, baking powder, spices, salt and pepper, then fold in the herbs and onions.
  - step_title: Fry
    instruction: Heat a good layer of oil in a wide pan. Drop spoonfuls of batter and press gently. Fry until the edges lace and brown, about 2 minutes a side.
  - step_title: Serve
    instruction: Stir the yogurt with garlic and lemon. Pile the fritters on top, still warm.
  field_notes:
  - value: Any tired herbs work. Save the stems, chop finer.
