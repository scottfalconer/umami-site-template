  field_method:
  - step_title: Step 1
    instruction: Prepare the vegetables by peeling and chopping the potatoes, finely
      chopping the onions, leeks and garlic.
  - step_title: Step 2
    instruction: Heat a little oil in a pan and add the chopped vegetables, gently
      cooking them for about 5 minutes.
  - step_title: Step 3
    instruction: Add the vegetable stock to the same pan and turn up the heat until
      simmering, adding the watercress after about 10 minutes. Cook until all the
      vegetables are soft and easily mashed.
  - step_title: Step 4
    instruction: Liquidize the soup either with a hand blender or in a mixer, until
      smooth.
  - step_title: Step 5
    instruction: If the soup has cooled too much whilst being liquidized, stir in
      the crème fraîche and reheat before serving (otherwise serve straight away).
      Season to taste.
