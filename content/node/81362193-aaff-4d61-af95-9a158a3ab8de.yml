  field_content:
  - value: "<p>Every cuisine has its long pot — the thing you make on Sunday, intending
      to eat it on Monday, and truly eat on Tuesday, when it has become itself.</p><p>In
      Tuscany it is ribollita. The name is not decorative; it means re-boiled, and
      the recipe is built around the idea that yesterday&#039;s soup is today&#039;s
      soup, plus some stale bread, plus a generous pour of new olive oil. The technique
      and the household are inseparable.</p>"
    format: content_format
  field_description:
  - value: A small portrait of ribollita, the Tuscan soup that taught itself to live
      twice.
