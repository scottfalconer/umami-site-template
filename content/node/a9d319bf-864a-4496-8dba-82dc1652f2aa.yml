  - entity: 99dce755-9606-4d57-b231-5f586c625c0f
  field_ingredients:
  - value: '## Cabbage

      1 head|savoy or pointed cabbage

      3 tbsp|neutral oil

      to taste|sea salt

      ## Anchovy butter

      80 g|cold butter, cubed

      6|anchovy fillets, minced

      1|small shallot, finely chopped

      1 tbsp|lemon juice

      1 tbsp|parsley, chopped'
  field_method:
  - value: 'Wedge and season|Cut the cabbage through the core into six wedges. Rub with oil and salt.

      Sear|In a very hot cast iron pan, sear the wedges on both cut sides until deeply charred, about 4 minutes per side.

      Finish|Lower the heat. Scatter in the anchovy, shallot, butter. Swirl until melted and glossy, spooning over the cabbage.

      Serve|Brighten with lemon and parsley. Eat with bread or spooned over rice.'
  field_notes:
  - value: Also excellent with radicchio or wedges of kohlrabi.
