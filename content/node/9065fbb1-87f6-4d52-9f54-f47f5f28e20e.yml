  field_content:
  - value: <p>Umami is a kitchen journal. We cook every recipe we publish, usually more than once, in small home kitchens that look like yours. We write in plain language. We photograph in daylight. We are not interested in novelty for its own sake.</p><h3>What you&#039;ll find here</h3><p>Recipes, grouped by category and by the kind of night they fit into. Stories — short essays on technique, ingredient, and the small politics of a home kitchen. Collections — seasonal guides that pull a dozen related things into one place.</p><h3>How we work</h3><p>Each recipe is developed by a single tester and checked by at least one other. Ingredients are listed by weight where it matters. Instructions are structured so that the recipe can be read, scanned, or stepped through on a tired Wednesday.</p><p>Imagery is ours unless credited. Sample copy on this site is illustrative. We are happy to hear from you — find us on the contact page.</p>
    format: content_format
