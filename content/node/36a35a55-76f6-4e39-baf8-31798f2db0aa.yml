  field_method:
  - step_title: Step 1
    instruction: Preheat the oven to 400°F/200°C. Starting with the pastry; rub the
      flour and butter together in a bowl until crumbling like breadcrumbs. Add water,
      a little at a time, until it forms a dough.
  - step_title: Step 2
    instruction: Roll out the pastry on a floured board and gently spread over your
      tin. Place in the fridge for 20 minutes before blind baking for a further 10.
  - step_title: Step 3
    instruction: Whilst the pastry is cooling, chop and gently cook the onions, garlic
      and courgette.
  - step_title: Step 4
    instruction: In a large bowl, add the soya milk, half the parmesan, and the eggs.
      Gently mix.
  - step_title: Step 5
    instruction: Once the pastry is cooked, spread the onions, garlic and sun dried
      tomatoes over the base and pour the eggs mix over. Sprinkle the remaining parmesan
      and careful lay the feta over the top. Bake for 30 minutes or until golden brown.
