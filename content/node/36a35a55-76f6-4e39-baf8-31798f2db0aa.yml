  field_description:
  - value: Tomatoes held in a low oven until they sweeten and slump, tossed with wide ribbons of pasta and torn basil.
  field_dietary:
  - entity: 3ce6cd35-e603-4716-8056-28c655260f25
  field_difficulty:
  - value: Easy
