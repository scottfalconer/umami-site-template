  field_content:
  - value: '<p>A cook only needs three salts: a fine one for the pasta water, a kosher one for everything else, and a flake for the last second. The rest is theater.</p><p>What matters is not the brand but the habit: salting at three moments — the seasoning of raw ingredients, the seasoning mid-cook, and the finishing. Skip any one and the dish will be flat in a way that sometimes reads as &#039;missing something&#039;. It isn&#039;t missing something. It is missing salt, twice.</p>'
    format: content_format
  field_description:
  - value: Three kinds, three moments, and a small promise about the difference it will make.
