  field_method:
  - step_title: Mix
    instruction: Heat oven to 200°C. Whisk dry. Stir in molasses and buttermilk until a heavy dough.
  - step_title: Bake
    instruction: Scrape into an oiled loaf tin. Bake 50–60 min until deep and hollow-sounding.
  - step_title: Cool
    instruction: Turn out. Rest at least 30 min before slicing.
