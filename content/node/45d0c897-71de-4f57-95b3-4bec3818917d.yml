  field_method:
  - step_title: Warm
    instruction: Warm the beans and their liquid gently with the oil, fennel, and a pinch of salt.
  - step_title: Dress
    instruction: Off heat, stir in celery and lemon juice. Taste for salt.
  - step_title: Finish
    instruction: Spoon into bowls. Top with celery leaves, zest, more oil, and a crack of pepper.
