  - group_label: Ingredients
    quantity: 1l
    ingredient: milk
  - group_label: Ingredients
    quantity: 200g
    ingredient: sugar
  - group_label: Ingredients
    quantity: '6'
    ingredient: egg yolks
  - group_label: Ingredients
    quantity: 30g
    ingredient: cornstarch
  - group_label: Ingredients
    quantity: '1'
    ingredient: cinnamon stick
  - group_label: Ingredients
    quantity: '1'
    ingredient: piece lemon peel
  field_method:
  - step_title: Step 1
    instruction: Mix the egg yolks, sugar, and cornstarch with 1/3 of the milk.
  - step_title: Step 2
    instruction: In a saucepan, boil 2/3 of the milk with the lemon peel and cinnamon.
  - step_title: Step 3
    instruction: After 3 minutes, remove from the heat and take out the lemon and
      cinnamon.
  - step_title: Step 4
    instruction: Slowly add the egg mixture to the hot milk through a strainer to
      ensure there are no lumps.
  - step_title: Step 5
    instruction: Return it to the heat until it boils, stirring constantly.
  - step_title: Step 6
    instruction: Once the mixture has begun to thicken, remove from the heat and put
      it into individual bowls to cool.
  - step_title: Step 7
    instruction: For an authentic finish, sprinkle with sugar and brown with a blowtorch
      or under a preheated broiler to caramelize.
