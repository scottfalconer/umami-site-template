  - group_label: ''
    quantity: 2 × 400 g
    ingredient: tins cannellini or butter beans, with their liquid
  - group_label: ''
    quantity: 3 stalks
    ingredient: celery, thinly sliced (leaves reserved)
  - group_label: ''
