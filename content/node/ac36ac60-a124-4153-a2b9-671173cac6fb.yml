  - group_label: Ingredients
    quantity: 80g
    ingredient: walnut halves
  field_method:
  - step_title: Step 1
    instruction: Use a little of the sunflower oil to grease an 8 inch square baking
      tin (or similar size) and line the tin with greaseproof paper.
  - step_title: Step 2
    instruction: Preheat the oven to 350°F/180°C.
  - step_title: Step 3
    instruction: Break approximately 1/3rd of the chocolate bar off and chop into
      small pieces. Roughly chop 2/3rds of the pecan nuts and mix together with the
      chopped chocolate. Set aside.
  - step_title: Step 4
    instruction: For finishing the brownies, chop or crush the remaining pecan nuts
      and walnuts, mix together and set aside.
  - step_title: Step 5
    instruction: Melt the remaining chocolate by bringing a couple inches of water
      to the boil in a small saucepan that is suitably sized for holding a heatproof
      bowl in the pan opening. Do not allow the bottom of the heatproof bowl to touch
      the water. Place the chocolate into the bowl to melt, stirring occasionally
      to ensure the chocolate has fully melted. Once melted, set aside and allow to
      cool slightly.
  - step_title: Step 6
    instruction: Whilst the chocolate is melting, begin to sieve the plain flour,
      coconut flour, and cocoa powder into a large mixing bowl and mix. Once mixed,
      stir in the baking powder and sugar.
  - step_title: Step 7
    instruction: Once the chocolate has cooled a little, begin to slowly stir the
      vanilla essence, sunflower oil, soya milk, and melted chocolate into the flour
      and cocoa mix.
  - step_title: Step 8
    instruction: Now stir in the previously chopped chocolate and pecan nuts, ensuring
      they are stirred evenly into the mixture.
  - step_title: Step 9
    instruction: Pour the mixture into the baking tin and spread evenly with a spatula.
  - step_title: Step 10
    instruction: Sprinkle the chopped pecan nuts and walnuts across the top and bake
      in the centre of the oven for 18 to 23 minutes.
  - step_title: Step 11
    instruction: Remove from the oven and allow to cool for 45 minutes. Carefully
      use the edges of the greaseproof paper to lift the brownie out of the tin and
      place onto a chopping board. With a sharp knife, gently cut into evenly sized
      pieces.
  - step_title: Step 12
    instruction: Serve on their own or with some vegan cream or ice cream.
