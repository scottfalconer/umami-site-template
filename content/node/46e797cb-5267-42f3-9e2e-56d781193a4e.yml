  field_content:
  - value: '<p>There is a particular dignity in cooking that fits inside a single pan. It is not minimalism, exactly — minimalism aspires to nothing, and a good one-pan dinner aspires to everything, just with tighter means.</p><p>A pan is a territory. It draws a line around the dinner and says: this much heat, this much surface, this much space. The cook is forced to sequence. Aromatics first, while the oil learns your kitchen. Then the thing that needs color. Then the thing that needs to soften. Finally the bright, green, late addition that keeps the whole endeavor from feeling brown.</p><h3>A short list of non-rules</h3><p>Choose a pan with some weight to it. Season in layers. Taste before the last step, not after. Serve straight from the pan whenever you can; the pleasure of a shared surface is an underrated one.</p><p>If you want a few places to start, consider our charred cabbage with anchovy butter, or the dal that pretends to take effort and doesn&#039;t. They share a common language.</p>'
    format: content_format
  field_description:
  - value: In praise of the single cast-iron, the short list of ingredients, and the kind of dinner that asks almost nothing of you.
