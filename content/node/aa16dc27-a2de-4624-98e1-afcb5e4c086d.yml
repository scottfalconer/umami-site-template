  field_content:
  - value: '<p>The first spring market of the year is always, in part, a letter to your future self. You write it in bags: three bunches of dill, a kilo of radishes that will only be radishes for another week, a softened lemon with leaves on.</p><p>We came back with: a bouquet of green garlic, one early strawberry (a scout, on behalf of its friends), nettles still with their sting, and a wedge of fresh cheese from a stand that only opens when the wind is right.</p><h3>What to do with all of it</h3><p>This week we&#039;re cooking our way through the haul. The green herb fritters will use every last drooping stem. The braised leeks will sit on the counter in a shallow dish for two days and improve each time we walk past them.</p>'
    format: content_format
  field_description:
  - value: Notes on a wet April, the first real radishes, and why you should buy three more bunches of herbs than you think you need.
  field_featured_image:
  - entity: 21b47df2-13d8-41dd-bb95-c8877142b514
  field_pull_quote:
  - value: You cannot buy too many herbs in April. The impossible idea is that you will have leftovers.
