  field_description:
  - value: Every Ukrainian family has a modification; with beans, without cabbage,
      etc. They are all valid though, there’s no unified ‘correct’ recipe. The one
      you are about to read and cook is borscht with pork ribs. You’ll appreciate
      its taste and flavor. You’ll connect and feel a true Ukrainian soul while savoring!
