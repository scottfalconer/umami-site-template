  field_ingredients:
  - value: '2 × 400 g|tins chickpeas, drained

      1|large onion, diced

      4 cloves|garlic, sliced

      1|preserved lemon, rind only, chopped

      1 pinch|saffron threads

      1 tsp|smoked paprika

      1 × 400 g|tin tomatoes

      500 ml|vegetable stock

      to serve|yogurt, dill, flatbread'
  field_method:
  - value: 'Soften|Sweat the onion in olive oil with salt until deeply soft, 12 min. Add garlic and paprika for 1 min.

      Bloom|Crumble in saffron with a splash of warm water. Add tomatoes and stock and simmer 10 min.

      Simmer|Add chickpeas and preserved lemon. Cook gently 30–40 min until the liquid reduces to a glossy sauce.

      Finish|Taste. Serve with yogurt, dill, and warm flatbread.'
  field_notes:
  - value: Better the next day. Freezes well.
