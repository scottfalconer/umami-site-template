  field_method:
  - step_title: Step 1
    instruction: Preheat the oven to 400°F/200°C. Put pork ribs on the baking dish
      and bake them for 30 minutes. Wash but don’t peel the celery root. Dice the
      carrot.
  - step_title: Step 2
    instruction: Put the baked pork ribs in a pot and add 3 liters of water. Chop
      the celery root and carrot and add them to the pot, along with half the unpeeled
      onion. Bring the pot to the boil and simmer for 30 minutes.
  - step_title: Step 3
    instruction: The heart of the borscht is sautéed vegetables. Dice the bell pepper,
      tomatoes, and remainder of the onion. Place the butter in a saucepan and add
      the vegetables. Cook them over a moderate heat until soft. Add the tomato paste,
      reduce the heat, and simmer for 5-7 minutes. Grate a beet, add it to the saucepan,
      and stew for a further 3-4 minutes.
  - step_title: Step 4
    instruction: Cut a garlic bulb in a half and add it to the pot. Shred the cabbage
      and put it aside.
  - step_title: Step 5
    instruction: Take the second beet and squeeze all the juice out. If you don’t
      have a juice squeezer, you can grate a beet and pass it through the sieve. Add
      the juice together with the allspice, bay leaves, and several pinches of salt
      to taste.
  - step_title: Step 6
    instruction: Optionally add the canned beans.
  - step_title: Step 7
    instruction: Add the smoked pears to the pot. They will make your dish smell smoky.
  - step_title: Step 8
    instruction: Add the shredded cabbage and cook for a further 5 minutes.
  - step_title: Step 9
    instruction: Take the borscht off the heat and let it stand for 30 minutes.
  - step_title: To serve
    instruction: Serve the borscht with a spoon of sour cream and chopped dill. Put
      the leftover borscht in the fridge, and remember that it tastes better the next
      day!
