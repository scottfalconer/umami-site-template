  field_method:
  - step_title: Step 1
    instruction: Preheat the oven to 400°F/200°C.
  - step_title: Step 2
    instruction: Finely chop the red onions and sweat gently on a low heat in olive
      oil for 5 minutes.
  - step_title: Step 3
    instruction: Peel the garlic and add it to the onions.
  - step_title: Step 4
    instruction: Meanwhile, chop the bell peppers to 1 inch pieces. Add the bell peppers
      and tomatoes to a roasting dish, and rub with lemon juice, olive oil and black
      pepper. Transfer to the oven and roast for 30 minutes.
  - step_title: Step 5
    instruction: Once the onions and garlic have softened, chop and add the chilies,
      seeds and all. Mix well and continue to gently fry.
  - step_title: Step 6
    instruction: Thoroughly wash your hands following handling raw chilies.
  - step_title: Step 7
    instruction: Once the tomatoes and bell peppers have finished roasting, add them
      to the pan. Cook for at least 10 minutes, breaking them up with a masher or
      a hand blender as they simmer. Once broken up, mix in the sugar.
  - step_title: Step 8
    instruction: Transfer the sauce to a blender and blend until smooth.
  - step_title: Step 9
    instruction: Return to the pan and add the vinegar and juice of the limes.
  - step_title: Step 10
    instruction: Cook through for a further 10 minutes, then leave to cool.
  - step_title: Step 11
    instruction: Transfer to sterilized jars and keep refrigerated.
  - step_title: Step 12
    instruction: Leave for at least two weeks before tasting.
