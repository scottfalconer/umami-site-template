  field_method:
  - step_title: Blister
    instruction: Heat oil in a cast iron until shimmering. Add peppers and leave undisturbed for 2 min. Toss and cook until charred in patches.
  - step_title: Dress
    instruction: Off heat, add honey and vinegar. Swirl to glaze. Salt heavily.
